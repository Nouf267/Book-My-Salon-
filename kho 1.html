<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>beauty venue salon</title>

<link rel="stylesheet" href="details.css">
</head>

<body>

<header>

<img src="bv.jpg" alt="Salon Logo" class="salon-logo">

<h1>beauty venue salon</h1>

</header>

<main>

<section class="container">

<p><strong>Location:</strong> Khobar - Shorofat Park</p>

<p><strong>Price:</strong> begin at 250</p>

<p><strong>Rating:</strong> (5/4.9)</p>

<h2>Choose Services</h2>

<form>

<section class="service-option">

<input type="checkbox" id="service1" value="hair Services">

<label for="service1">hair Services</label>

</section>

<section class="service-option">

<input type="checkbox" id="service2" value="Nailse">

<label for="service2">Nailse</label>

</section>

<section class="service-option">

<input type="checkbox" id="service3" value="Treatments">

<label for="service3">Treatments</label>

</section>

<section class="service-option">

<input type="checkbox" id="service4" value="brise Services">

<label for="service4">brise Services</label>

</section>

<p id="bookingMsg"></p>

<button type="button" id="bookBtn" onclick="bookNow()">
Book Now
</button>

<button type="button" onclick="location.href='home.html#salonsSection'">
Back
</button>

</form>

</section>

</main>

<footer>

<section class="contact">

<p>
Contact us on WhatsApp:
<a href="https://wa.me/966580417226" target="_blank">
+966 58 041 7226
</a>
</p>

</section>

<section class="copyright">

<p>&copy; 2026 BookMySalon. All rights reserved.</p>

</section>

</footer>

<script>
function bookNow(){

let loggedInUser=localStorage.getItem("loggedInUser");

if(loggedInUser===null){

let goLogin=confirm("Please login first to book an appointment.\nDo you want to go to the login page?");

if(goLogin===true){
location.href="log.html";
}

return;
}

let salonName=document.getElementsByTagName("h1")[0].innerText;

let checkboxes=document.getElementsByTagName("input");

let selectedServices="";

for(let i=0;i<checkboxes.length;i++){

if(checkboxes[i].type==="checkbox"&&checkboxes[i].checked===true){
selectedServices=selectedServices+checkboxes[i].value+", ";
}
}

if(selectedServices===""){

let msg=document.getElementById("bookingMsg");

msg.innerText="⚠️ Please select at least one service.";

msg.style.color="red";

return;
}

localStorage.setItem("bookingSalon",salonName);

localStorage.setItem("bookingServices",selectedServices);

location.href="book.html";
}
</script>

</body>
</html>
